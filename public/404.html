<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AlkonoPlayground — Redirecting...</title>
    <script type="text/javascript">
      // 404 fallback script for SPA hosting (GitHub Pages, Vercel, etc.)
      // It captures the path that caused the 404 and redirects back to index.html
      // where the app can handle the routing logic.
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
